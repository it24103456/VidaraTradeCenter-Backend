# APPLICATION INFO
spring.application.name=vidara-trade-center
server.port=8081


# ACTIVE PROFILE
# Loads application-{profile}.properties
# For local development: dev
# For production: prod

spring.profiles.active=dev


# THYMELEAF (Admin Dashboard)
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false
spring.thymeleaf.enabled=true


# FILE UPLOAD LIMITS
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB


# JSON Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# PayHere: set payhere.notify-base-url in profile-specific properties to your API's public HTTPS origin
# (no path) so PayHere can POST /api/payment/notify. See application-dev.properties for sandbox / localhost notes.

# Contact Us form: optional app.mail.contact-inbox (per profile). If unset, inquiries go to app.mail.from-address.