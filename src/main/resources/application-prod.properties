# ==========================================
# Database Configuration (Railway Variables)
# ==========================================
# These match the standard Railway/Postgres environment variables
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================
# JPA / Hibernate Settings
# ==========================================
# 'update' is safe for most deployments, ensures schema matches entities
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
# Remove explicit dialect; Hibernate detects PostgreSQL automatically
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ==========================================
# Spring Boot Actuator (Health Checks)
# ==========================================
# Expose health and info endpoints
management.endpoints.web.exposure.include=health,info
# Enable Kubernetes-style liveness/readiness probes (optional but good practice)
management.endpoint.health.probes.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

# ==========================================
# Server Configuration
# ==========================================
# Railway injects PORT env var; default to 8080 if missing
server.port=${PORT:8080}

# ==========================================
# File Uploads
# ==========================================
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
# Use /tmp for ephemeral storage in containers
file.upload-dir=/tmp/uploads

# ==========================================
# Logging
# ==========================================
logging.level.root=INFO
logging.level.org.springframework.web=INFO
logging.level.com.vidara=DEBUG