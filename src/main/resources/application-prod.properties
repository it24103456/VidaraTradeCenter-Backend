# ==========================================
# Database Configuration (Matches Your Railway Vars)
# ==========================================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}

# ==========================================
# JPA / Hibernate Settings
# ==========================================
# Uses your env var SPRING_JPA_HIBERNATE_DDL_AUTO if set, otherwise defaults to 'update'
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
# Let Hibernate auto-detect the dialect for PostgreSQL
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ==========================================
# JWT Configuration (Matches Your Railway Vars)
# ==========================================
# These map directly to your APP_JWT_... variables
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration=${APP_JWT_EXPIRATION:86400000}
app.jwt.refresh.expiration=${APP_JWT_REFRESH_EXPIRATION:604800000}

# ==========================================
# Spring Boot Actuator (Health Checks)
# ==========================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

# ==========================================
# Server Configuration
# ==========================================
server.port=${PORT:8080}

# ==========================================
# File Uploads
# ==========================================
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
file.upload-dir=/tmp/uploads

# ==========================================
# Logging
# ==========================================
logging.level.root=INFO
logging.level.org.springframework.web=INFO
logging.level.com.vidara=DEBUG