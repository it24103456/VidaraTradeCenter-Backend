# ==========================================
# Database Configuration (MUST MATCH RAILWAY VARS)
# ==========================================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}

# ==========================================
# JPA / Hibernate
# ==========================================
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Connection Pool & Transaction settings
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.auto-commit=true

# ==========================================
# Flyway Database Migrations
# ==========================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0


# ==========================================
# JWT Configuration (MUST MATCH RAILWAY VARS)
# ==========================================
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration=${APP_JWT_EXPIRATION:86400000}
app.jwt.refresh.expiration=${APP_JWT_REFRESH_EXPIRATION:604800000}

# ==========================================
# Email Configuration (MUST MATCH RAILWAY VARS)
# ==========================================
# NOTE: Using Gmail SMTP from Railway may timeout due to port restrictions
# Consider switching to: SendGrid, Mailgun, AWS SES, Brevo
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
app.mail.from-address=${APP_MAIL_FROM_ADDRESS}
app.mail.from-name=${APP_MAIL_FROM_NAME}
app.mail.contact-inbox=${MAIL_CONTACT_INBOX}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
spring.mail.properties.mail.smtp.socketFactory.port=587
spring.mail.properties.mail.smtp.socketFactory.fallback=false
# For Gmail App Password: Generate at https://myaccount.google.com/apppasswords
# Important: Use App Password, not regular password for enhanced security

# ==========================================
# Actuator & Server
# ==========================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.mail.enabled=false
server.port=${PORT:8080}

# ==========================================
# PayHere Payment Gateway Configuration
# ==========================================
payhere.merchant-id=${PAYHERE_MERCHANT_ID}
payhere.merchant-secret=${PAYHERE_MERCHANT_SECRET}
payhere.sandbox=${PAYHERE_SANDBOX:false}
payhere.frontend-url=${PAYHERE_FRONTEND_URL:https://vidara-trade-center-frontend-dep1.vercel.app}
payhere.notify-base-url=${PAYHERE_NOTIFY_BASE_URL:https://vidaratradecenter-backend-production.up.railway.app}

# ==========================================
# CORS (Leave default for now)
# ==========================================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# ==========================================
# File Uploads & Logging
# ==========================================
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
file.upload-dir=/tmp/uploads
logging.level.root=INFO
logging.level.com.vidara=DEBUG
logging.level.org.springframework.mail=WARN
logging.level.org.eclipse.angus.mail=WARN

