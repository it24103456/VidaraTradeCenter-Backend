# ==========================================
# Database Configuration (MUST MATCH RAILWAY VARS)
# ==========================================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}

# ==========================================
# JPA / Hibernate
# ==========================================
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# JWT Configuration (MUST MATCH RAILWAY VARS)
# ==========================================
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration=${APP_JWT_EXPIRATION:86400000}
app.jwt.refresh.expiration=${APP_JWT_REFRESH_EXPIRATION:604800000}

# ==========================================
# Email Configuration (MUST MATCH RAILWAY VARS)
# ==========================================
#spring.mail.host=${MAIL_HOST:smtp.gmail.com}
#spring.mail.port=${MAIL_PORT:587}
#spring.mail.username=${MAIL_USERNAME}
#spring.mail.password=${MAIL_PASSWORD}
#spring.mail.properties.mail.smtp.auth=true
#spring.mail.properties.mail.smtp.starttls.enable=true

# ==========================================
# Actuator & Server
# ==========================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
server.port=${PORT:8080}

# ==========================================
# CORS (Leave default for now)
# ==========================================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# ==========================================
# File Uploads & Logging
# ==========================================
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
file.upload-dir=/tmp/uploads
logging.level.root=INFO
logging.level.com.vidara=DEBUG