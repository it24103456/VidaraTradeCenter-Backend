# POSTGRESQL DATABASE
spring.datasource.url=jdbc:postgresql://localhost:5432/vidara_trade_center
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / HIBERNATE
# ddl-auto options:
#   create      = drop & create tables every restart (DANGEROUS)
#   create-drop = drop tables when app stops
#   update      = update schema without losing data (GOOD for dev)
#   validate    = only validate, don't change schema
#   none        = do nothing

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# FILE UPLOAD DIRECTORY
file.upload-dir=uploads

# JWT SECRET
app.jwt.secret=YourSuperSecretKeyHereMakeItLongAtLeast256BitsForHS256Algorithm123456
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

# LOGGING
logging.level.root=INFO
logging.level.com.vidara.tradecenter=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE


