# ========== TEST PROFILE ==========
# Uses the same PostgreSQL database with transactional rollback

spring.datasource.url=jdbc:postgresql://localhost:5432/vidara_trade_center
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT (required for context to load)
app.jwt.secret=testSecretKeyForJWTTokenGenerationInTestingEnvironment1234567890abcdef
app.jwt.expirationMs=3600000

# Disable mail during tests
spring.mail.host=localhost
spring.mail.port=25

# File upload (required for context)
app.file.upload-dir=./test-uploads
